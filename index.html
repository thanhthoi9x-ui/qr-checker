<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Đối chiếu nhãn — QR vs OCR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root{
    --bg:#0d0d10; --panel:#17171c; --panel2:#1e1e25; --line:#2a2a33;
    --gold:#f2b705; --gold-dim:#8a6a10; --text:#f2f0ea; --muted:#8f8f9a;
    --ok:#3ddc84; --warn:#f2b705; --bad:#ff5c5c; --hl:#e08c1f;
    --radius:22px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,"SF Pro Text","Segoe UI",Roboto,sans-serif;padding:14px;max-width:560px;margin:0 auto}
  .mono{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace}

  /* ---- Khung camera ---- */
  .cam-wrap{position:relative;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:#000}
  video{width:100%;display:block;aspect-ratio:3/4;object-fit:cover}
  .frame{position:absolute;inset:10% 12% 28% 12%;border:2px dashed rgba(242,183,5,.75);border-radius:26px;pointer-events:none}
  .frame::before,.frame::after{content:"";position:absolute;width:56px;height:56px;border:4px solid #fff}
  .frame::before{left:-4px;bottom:-4px;border-top:none;border-right:none;border-radius:0 0 0 22px}
  .frame::after{right:-4px;top:-4px;border-bottom:none;border-left:none;border-radius:0 22px 0 0}
  .chips{position:absolute;left:10px;right:10px;bottom:64px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .chip{flex:0 0 auto;background:rgba(13,13,16,.88);border:1px solid var(--line);border-radius:16px;padding:10px 14px;min-width:230px}
  .chip .k{font-size:11px;letter-spacing:.14em;color:var(--muted);display:flex;align-items:center;gap:6px;text-transform:uppercase}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:#555}
  .chip .dot.on{background:var(--ok)}
  .chip .v{margin-top:4px;font-size:15px;letter-spacing:.02em}
  .manual-link{display:inline-block;margin:12px 4px 2px;color:var(--gold);font-size:16px}
  .cam-msg{position:absolute;inset:0;display:none;align-items:center;justify-content:center;text-align:center;padding:24px;color:var(--muted);font-size:15px;background:rgba(13,13,16,.92)}
  .cam-msg.show{display:flex}

  /* ---- Thẻ kết quả ---- */
  .card{margin-top:16px;border:1.5px solid var(--gold-dim);border-radius:var(--radius);background:var(--panel);padding:18px;display:none}
  .card.show{display:block}
  .card.v-match{border-color:var(--ok)}
  .card.v-format{border-color:var(--gold)}
  .card.v-loose{border-color:var(--gold)}
  .card.v-mismatch{border-color:var(--bad)}
  .head{display:flex;gap:14px;align-items:center;margin-bottom:16px}
  .head .icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;background:#3a2f12;color:var(--gold)}
  .v-match .icon{background:#123a22;color:var(--ok)}
  .v-mismatch .icon{background:#3a1212;color:var(--bad)}
  .head h2{font-size:24px;letter-spacing:.01em;color:var(--gold)}
  .v-match .head h2{color:var(--ok)}
  .v-mismatch .head h2{color:var(--bad)}
  .head p{color:var(--muted);font-size:14px;margin-top:2px}

  .row{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}
  .row .k{font-size:12px;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .row .k .sq{width:10px;height:10px;border-radius:3px}
  .row.gold .k{color:var(--gold)} .row.gold .sq{background:var(--gold)}
  .row.white .k{color:#cfcfd6} .row.white .sq{background:#e8e8ee}
  .row .val{font-size:21px;font-weight:700;letter-spacing:.01em;word-break:break-all}
  .row .val mark{background:var(--hl);color:#111;border-radius:4px;padding:0 2px}
  .fix{margin-top:6px;font-size:13px;color:var(--ok)}

  .note-label{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:14px 0 8px}
  textarea{width:100%;min-height:110px;background:var(--panel2);border:1px solid var(--line);border-radius:16px;color:var(--text);font-size:16px;line-height:1.45;padding:14px;resize:vertical;font-family:inherit}
  textarea:focus{outline:2px solid var(--gold-dim)}

  .actions{display:flex;gap:10px;margin-top:16px}
  button{border:none;border-radius:16px;padding:16px 10px;font-size:17px;font-weight:700;flex:1;cursor:pointer;font-family:inherit}
  .btn-ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  .btn-gold{background:var(--gold);color:#141200}
  button:active{transform:scale(.97)}

  /* ---- Nhập tay ---- */
  .manual{display:none;margin-top:14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);padding:18px}
  .manual.show{display:block}
  .manual label{display:block;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:10px 0 6px}
  .manual input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px;font-size:17px;color:var(--text)}
  .manual input:focus{outline:2px solid var(--gold-dim)}

  /* ---- Lịch sử ---- */
  .hist{margin-top:22px}
  .hist-head{display:flex;justify-content:space-between;align-items:center;color:var(--muted);letter-spacing:.14em;font-size:13px;text-transform:uppercase;padding:0 4px}
  .hist-head .count{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:2px 10px;color:var(--text)}
  .hist-item{margin-top:10px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px 14px;font-size:14px}
  .hist-item .tag{font-size:11px;font-weight:700;letter-spacing:.08em;padding:2px 8px;border-radius:8px;display:inline-block;margin-bottom:6px}
  .t-MATCH{background:#123a22;color:var(--ok)} .t-MATCH_FORMAT_ONLY{background:#3a2f12;color:var(--gold)}
  .t-MATCH_LOOSE{background:#3a2f12;color:var(--gold)} .t-MISMATCH{background:#3a1212;color:var(--bad)}
  .hist-item .t{color:var(--muted);font-size:12px;float:right}
  .hist-empty{color:var(--muted);text-align:center;padding:18px;font-size:14px}
  .hist-clear{margin-top:10px;width:100%;background:none;border:1px dashed var(--line);color:var(--muted);font-weight:400;font-size:14px;padding:10px}
</style>
</head>
<body>

<!-- CAMERA -->
<div class="cam-wrap">
  <video id="video" playsinline muted></video>
  <div class="frame"></div>
  <div class="chips">
    <div class="chip"><div class="k"><span class="dot" id="dotQR"></span>QR · Nhãn trắng</div><div class="v mono" id="chipQR">Đang chờ…</div></div>
    <div class="chip"><div class="k"><span class="dot" id="dotOCR"></span>Item No · Nhãn vàng</div><div class="v mono" id="chipOCR">Đang chờ…</div></div>
  </div>
  <div class="cam-msg" id="camMsg"></div>
</div>
<a class="manual-link" href="#" id="manualLink">Nhập tay (khi camera / OCR không dùng được)</a>

<!-- NHẬP TAY -->
<div class="manual" id="manualBox">
  <label for="mQR">Nhãn trắng · mã QR</label>
  <input id="mQR" class="mono" autocapitalize="characters" placeholder="PR-LEPT-42-PC(Y1023)-BN">
  <label for="mOCR">Nhãn vàng · Item No</label>
  <input id="mOCR" class="mono" autocapitalize="characters" placeholder="PR-LEPT-42-PC(Y1023)-BN">
  <div class="actions"><button class="btn-gold" id="manualCompare">So sánh</button></div>
</div>

<!-- KẾT QUẢ -->
<div class="card" id="card">
  <div class="head">
    <div class="icon" id="cardIcon">≈</div>
    <div><h2 id="cardTitle">—</h2><p id="cardSub">Đối chiếu tự động: QR + OCR</p></div>
  </div>
  <div class="row gold">
    <div class="k"><span class="sq"></span>Nhãn vàng · Item No (đọc bằng OCR)</div>
    <div class="val mono" id="valOCR"></div>
    <div class="fix" id="fixNote" style="display:none"></div>
  </div>
  <div class="row white">
    <div class="k"><span class="sq"></span>Nhãn trắng · mã QR (giải mã)</div>
    <div class="val mono" id="valQR"></div>
  </div>
  <div class="note-label">Ghi chú (tự sinh — sửa được)</div>
  <textarea id="note"></textarea>
  <div class="actions">
    <button class="btn-ghost" id="btnNext">📷 Kiện tiếp theo</button>
    <button class="btn-gold" id="btnSave">💾 Lưu kết quả</button>
  </div>
</div>

<!-- LỊCH SỬ -->
<div class="hist">
  <div class="hist-head"><span>Lịch sử kiểm tra</span><span class="count" id="histCount">0</span></div>
  <div id="histList"><div class="hist-empty">Chưa có bản ghi nào.</div></div>
  <button class="hist-clear" id="histClear">Xóa toàn bộ lịch sử</button>
</div>

<canvas id="cv" hidden></canvas>

<script>
/* ═══════════════ 1. LÕI ĐỐI CHIẾU (bản vá) ═══════════════
   QR = nguồn chuẩn. OCR = nguồn nhiễu.
   Lệch chỉ ở dấu phân cách => KHỚP nội dung, phục hồi theo QR. */
const SEP_RE = /[-–—_.\s]/g;
const CONF = [["0","O"],["1","I"],["1","L"],["5","S"],["8","B"],["2","Z"]];
const normCore  = s => (s||"").normalize("NFC").toUpperCase().replace(SEP_RE,"");
const normLoose = s => CONF.reduce((t,[d,l]) => t.split(l).join(d), normCore(s));
const cleanOcrRaw = s => (s||"").replace(/[|]/g,"I").replace(/[`'"“”‘’]/g,"").replace(/\s{2,}/g," ").trim();

function compareLabels(qrText, ocrText){
  const qr=(qrText||"").trim(), ocr=(ocrText||"").trim();
  if(qr===ocr) return {verdict:"MATCH",corrected:ocr,title:"Khớp",
    note:"Khớp tuyệt đối (QR = OCR)."};
  if(normCore(qr)===normCore(ocr)) return {verdict:"MATCH_FORMAT_ONLY",corrected:qr,title:"Khớp nội dung",
    note:`KHỚP nội dung. Chênh lệch chỉ ở dấu phân cách (-, khoảng trắng) — nguyên nhân: OCR bỏ sót nét mảnh, không phải nhãn in sai. Đã phục hồi theo QR: "${qr}".`};
  if(normLoose(qr)===normLoose(ocr)) return {verdict:"MATCH_LOOSE",corrected:qr,title:"Gần khớp — xác nhận mắt",
    note:`GẦN KHỚP: lệch ở ký tự OCR dễ nhầm (0/O, 1/I, 5/S, 8/B…). Khả năng cao là lỗi đọc OCR — xác nhận nhanh bằng mắt trước khi lưu. QR: "${qr}" | OCR: "${ocr}".`};
  return {verdict:"MISMATCH",corrected:null,title:"Lệch nội dung",
    note:`LỆCH NỘI DUNG THẬT giữa nhãn vàng (OCR) và nhãn trắng (QR) — cần kiểm tra kiện hàng. QR: "${qr}" | OCR: "${ocr}".`};
}

/* Tô sáng phần khác nhau giữa 2 chuỗi (prefix/suffix chung giữ nguyên) */
function diffHTML(a,b){
  let p=0; while(p<a.length&&p<b.length&&a[p]===b[p]) p++;
  let s=0; while(s<a.length-p&&s<b.length-p&&a[a.length-1-s]===b[b.length-1-s]) s++;
  const esc=t=>t.replace(/&/g,"&amp;").replace(/</g,"&lt;");
  const mid=a.slice(p,a.length-s);
  return esc(a.slice(0,p))+(mid?`<mark>${esc(mid)}</mark>`:"")+esc(a.slice(a.length-s));
}

/* ═══════════════ 2. TRẠNG THÁI & UI ═══════════════ */
const $=id=>document.getElementById(id);
let qrText=null, ocrText=null, current=null, scanning=false;

function showResult(qr, ocr){
  const r = compareLabels(qr, ocr);
  current = {qr, ocr, ...r, at:new Date().toISOString()};
  const card=$("card");
  card.className="card show v-"+({MATCH:"match",MATCH_FORMAT_ONLY:"format",MATCH_LOOSE:"loose",MISMATCH:"mismatch"}[r.verdict]);
  $("cardIcon").textContent={MATCH:"✓",MATCH_FORMAT_ONLY:"≈",MATCH_LOOSE:"≈",MISMATCH:"✕"}[r.verdict];
  $("cardTitle").textContent=r.title.toUpperCase();
  $("valOCR").innerHTML=diffHTML(ocr,qr);
  $("valQR").innerHTML=diffHTML(qr,ocr);
  const fix=$("fixNote");
  if(r.verdict==="MATCH_FORMAT_ONLY"){ fix.style.display="block"; fix.textContent="→ Phục hồi theo QR: "+r.corrected; }
  else fix.style.display="none";
  $("note").value=r.note;
  card.scrollIntoView({behavior:"smooth",block:"start"});
}

/* ---- Lịch sử (localStorage) ---- */
const KEY="label-check-history";
const loadHist=()=>{try{return JSON.parse(localStorage.getItem(KEY))||[]}catch{return[]}};
function renderHist(){
  const h=loadHist(); $("histCount").textContent=h.length;
  $("histList").innerHTML = h.length? h.map(x=>
    `<div class="hist-item"><span class="t">${new Date(x.at).toLocaleString("vi-VN")}</span>
     <span class="tag t-${x.verdict}">${x.title}</span>
     <div class="mono">QR: ${x.qr}</div><div class="mono">OCR: ${x.ocr}</div>
     ${x.userNote?`<div style="color:var(--muted);margin-top:4px">${x.userNote.replace(/</g,"&lt;")}</div>`:""}</div>`
  ).join("") : `<div class="hist-empty">Chưa có bản ghi nào.</div>`;
}
$("btnSave").onclick=()=>{
  if(!current) return;
  const h=loadHist();
  h.unshift({...current,userNote:$("note").value});
  localStorage.setItem(KEY,JSON.stringify(h.slice(0,300)));
  renderHist(); resetScan();
};
$("btnNext").onclick=resetScan;
$("histClear").onclick=()=>{ if(confirm("Xóa toàn bộ lịch sử kiểm tra?")){localStorage.removeItem(KEY);renderHist();} };

function resetScan(){
  qrText=ocrText=null; current=null;
  $("card").className="card";
  $("chipQR").textContent=$("chipOCR").textContent="Đang chờ…";
  $("dotQR").className=$("dotOCR").className="dot";
  scanning=true;
}

/* ---- Nhập tay ---- */
$("manualLink").onclick=e=>{e.preventDefault();$("manualBox").classList.toggle("show");};
$("manualCompare").onclick=()=>{
  const qr=$("mQR").value.trim(), ocr=cleanOcrRaw($("mOCR").value);
  if(!qr||!ocr){alert("Nhập đủ cả 2 nhãn để so sánh.");return;}
  scanning=false; showResult(qr,ocr);
};

/* ═══════════════ 3. CAMERA + QR + OCR ═══════════════ */
const video=$("video"), cv=$("cv"), ctx=cv.getContext("2d",{willReadFrequently:true});
let ocrWorker=null, ocrBusy=false, lastOcrAt=0;

async function initOCR(){
  try{
    ocrWorker = await Tesseract.createWorker("eng");
    await ocrWorker.setParameters({
      tessedit_char_whitelist:"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789()-", // giữ dấu gạch nối
      tessedit_pageseg_mode:"7",                                        // 1 dòng text
      preserve_interword_spaces:"1",
    });
  }catch(e){ console.warn("OCR init failed",e); }
}

async function initCam(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280}}});
    video.srcObject=stream; await video.play();
    scanning=true; requestAnimationFrame(loop);
  }catch(e){
    const m=$("camMsg"); m.classList.add("show");
    m.textContent="Không mở được camera ("+e.name+"). Dùng chế độ Nhập tay bên dưới.";
    $("manualBox").classList.add("show");
  }
}

function grabFrame(){
  cv.width=video.videoWidth; cv.height=video.videoHeight;
  ctx.drawImage(video,0,0);
  return ctx.getImageData(0,0,cv.width,cv.height);
}

/* Tiền xử lý cho OCR: crop khung giữa, grayscale + threshold, dilate ngang nhẹ
   để cứu dấu "-" mảnh dễ mất khi ảnh mờ. */
function ocrCanvas(){
  const w=video.videoWidth,h=video.videoHeight;
  const cx=Math.round(w*.10), cy=Math.round(h*.10), cw=Math.round(w*.80), ch=Math.round(h*.62);
  const c=document.createElement("canvas"); c.width=cw*2; c.height=ch*2;      // upscale x2
  const g=c.getContext("2d"); g.imageSmoothingEnabled=true;
  g.drawImage(video,cx,cy,cw,ch,0,0,c.width,c.height);
  const img=g.getImageData(0,0,c.width,c.height), d=img.data;
  for(let i=0;i<d.length;i+=4){
    const v=(d[i]*.3+d[i+1]*.59+d[i+2]*.11)|0, t=v>120?255:0;
    d[i]=d[i+1]=d[i+2]=t;
  }
  g.putImageData(img,0,0);
  return c;
}

async function runOCR(){
  if(!ocrWorker||ocrBusy) return;
  ocrBusy=true;
  try{
    const {data}=await ocrWorker.recognize(ocrCanvas());
    const lines=(data.text||"").split("\n").map(cleanOcrRaw).filter(Boolean);
    // Chọn dòng "giống mã hàng" nhất: dài >=6, có cả chữ và số
    const cand=lines.filter(l=>l.length>=6&&/[A-Z]/.test(l)&&/\d/.test(l))
                    .sort((a,b)=>b.length-a.length)[0];
    if(cand){
      ocrText=cand;
      $("chipOCR").textContent=cand; $("dotOCR").className="dot on";
    }
  }catch(e){}
  ocrBusy=false;
}

function loop(){
  if(scanning && video.readyState===4){
    // QR mỗi frame
    try{
      const img=grabFrame();
      const code=jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"});
      if(code&&code.data){
        qrText=code.data.trim();
        $("chipQR").textContent=qrText; $("dotQR").className="dot on";
      }
    }catch(e){}
    // OCR mỗi 2 giây
    const now=Date.now();
    if(now-lastOcrAt>2000){ lastOcrAt=now; runOCR(); }
    // Đủ 2 nguồn => đối chiếu
    if(qrText&&ocrText){ scanning=false; showResult(qrText,ocrText); }
  }
  requestAnimationFrame(loop);
}

renderHist();
initOCR();
initCam();
</script>
</body>
</html>
