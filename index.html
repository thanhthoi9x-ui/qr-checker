<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0b1220">
<title>Kiểm tra nhãn QR</title>
<style>
  :root{--bg:#0f172a;--panel:#1e293b;--panel2:#273449;--line:#334155;--txt:#e2e8f0;--muted:#94a3b8;
        --ok:#22c55e;--warn:#f59e0b;--fail:#ef4444;--blue:#2563eb;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);padding-bottom:40px}
  header{padding:12px 14px;text-align:center;border-bottom:1px solid var(--line);position:sticky;top:0;background:#0b1220;z-index:5}
  header h1{margin:0;font-size:16px} header .pill{font-size:11px;color:var(--muted)}
  main{padding:14px;display:flex;flex-direction:column;gap:12px;max-width:680px;margin:0 auto}
  .big{width:100%;border:none;border-radius:14px;padding:16px;font-size:18px;font-weight:800;font-family:inherit;color:#fff}
  .cap{background:var(--blue)} .check{background:#16a34a} .check:disabled{background:#334155;color:#64748b}
  /* hang doi anh cho */
  .queue{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px}
  .qitem{position:relative;border-radius:9px;overflow:hidden;background:#000;aspect-ratio:1/1}
  .qitem img{width:100%;height:100%;object-fit:cover}
  .qitem .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:15px;line-height:1;font-weight:800}
  .qitem .no{position:absolute;bottom:2px;left:4px;font-size:11px;font-weight:800;text-shadow:0 1px 2px #000}
  .status{font-size:12px;color:var(--muted);text-align:center;min-height:16px}
  .counter{display:flex;gap:8px} .counter div{flex:1;text-align:center;background:var(--panel2);border-radius:8px;padding:6px}
  .counter b{display:block;font-size:18px} .cok b{color:var(--ok)} .cfail b{color:var(--fail)} .cwarn b{color:var(--warn)} .counter span{font-size:10px;color:var(--muted)}
  /* the ket qua */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .card .head{display:flex;gap:10px;padding:10px;align-items:center}
  .card .head img{width:72px;height:72px;object-fit:cover;border-radius:8px;background:#000;flex:none}
  .card .head .v{flex:1;min-width:0}
  .badge{display:inline-block;font-size:15px;font-weight:800;letter-spacing:.5px;padding:4px 12px;border-radius:8px}
  .badge.ok{background:#052e16;color:var(--ok)} .badge.warn{background:#3a2a06;color:var(--warn)} .badge.fail{background:#3b0d0d;color:var(--fail)}
  .qr{font-size:12px;color:var(--muted);margin-top:4px;word-break:break-all}
  .clines{padding:0 10px}
  .cl{display:flex;gap:8px;padding:7px 9px;border-radius:8px;background:var(--panel2);border-left:4px solid var(--line);margin-bottom:6px}
  .cl .ico{font-size:15px} .cl .t{font-size:11px;font-weight:700} .cl .d{font-size:11px;color:var(--muted);word-break:break-word}
  .cl.ok{border-left-color:var(--ok)} .cl.ok .ico{color:var(--ok)}
  .cl.warn{border-left-color:var(--warn)} .cl.warn .ico{color:var(--warn)}
  .cl.fail{border-left-color:var(--fail)} .cl.fail .ico{color:var(--fail)}
  details.edit{margin:0 10px 8px} details.edit summary{font-size:12px;color:var(--muted);cursor:pointer}
  .field{margin:6px 0} .field label{display:block;font-size:10px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
  .field input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:8px;font-size:13px;font-family:inherit}
  .conf{display:flex;gap:8px;padding:8px 10px} .conf>button{flex:1;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:800;font-family:inherit}
  .b-pass{background:var(--ok);color:#04240f} .b-err{background:var(--fail);color:#fff}
  .saved{padding:8px 10px;text-align:center;font-size:13px;font-weight:700}
  .btn-ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  input[type=file]{display:none} .hint{font-size:12px;color:var(--muted);text-align:center}
</style>
</head>
<body>
<header>
  <h1>✅ Kiểm tra nhãn QR</h1>
  <div class="pill" id="engine">Đang chuẩn bị…</div>
</header>
<main>
  <input type="file" id="cam" accept="image/*" capture="environment" multiple>
  <button class="big cap" id="btnCap">📸 CHỤP / CHỌN ẢNH (thêm)</button>
  <div class="hint" id="hint">Chụp lần lượt nhiều nhãn — mỗi ảnh được thêm vào danh sách bên dưới.</div>
  <div class="queue" id="queue"></div>
  <button class="big check" id="btnCheck" disabled>✅ KIỂM TRA TẤT CẢ (0)</button>
  <div class="status" id="status"></div>

  <div class="counter">
    <div class="cok"><b id="nOk">0</b><span>Đạt</span></div>
    <div class="cfail"><b id="nFail">0</b><span>Lỗi</span></div>
    <div class="cwarn"><b id="nWarn">0</b><span>Cần xem</span></div>
    <div><b id="nTotal">0</b><span>Đã ghi</span></div>
  </div>
  <div id="results"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

};

  const el=document.createElement('div'); el.className='qitem'; el.id='q'+item.id;
  el.innerHTML=`<img src="${item.url}"><span class="no">#${queue.length}</span><button class="rm">×</button>`;

// ---------- 2) Kiem tra tat ca 1 luot ----------
$('#btnCheck').onclick=async ()=>{
  if(!queue.length) return;
  $('#btnCheck').disabled=true; $('#btnCap').disabled=true;
  const batch=queue.slice(); queue=[]; $('#queue').innerHTML=''; refreshCheckBtn();
  for(let i=0;i<batch.length;i++){
    $('#status').textContent=`Đang kiểm tra ${i+1}/${batch.length}…`;
    const f=await analyze(batch[i].canvas);

// ---------- 3) Ve the ket qua (moi anh 1 the, sua duoc) ----------

function parseFields(text){const lines=(text||'').replace(/\r/g,'').split('\n').map(l=>l.trim()).filter(Boolean);const j=lines.join(' ');const o={itemNo:'',item:''};
  let m=j.match(/ITEM\s*N[O0]\.?\s*[:.]*\s*([A-Z0-9_().\-\/ ]+?)(?=\s*(ITEM[:\s]|SIZE|QTY|P\.?O|MADE|$))/i);
  if(m)o.itemNo=m[1].replace(/\s+/g,'').replace(/[.\-–]+$/,'');
  const il=lines.find(l=>/^\s*ITEM\s*[:.]/i.test(l)&&!/ITEM\s*N/i.test(l));
  if(il)o.item=il.replace(/^\s*ITEM\s*[:.]\s*/i,'').replace(/[=_\[\]|]{1,}.*$/,'').trim();
  else{m=j.match(/ITEM\s*:\s*([A-Za-z0-9"'().\-\/ ]+?)(?=\s*(SIZE|QTY|P\.?O|MADE|ITEM\s*N|$))/i);if(m)o.item=m[1].trim();}
  return o;}
function parseSticker(text,qrNorm){const lines=(text||'').replace(/\r/g,'').split('\n').map(l=>l.trim()).filter(Boolean);const d=[];
  for(const l of lines){const n=l.toUpperCase().replace(/\s/g,'');
    if(qrNorm&&(n.includes(qrNorm)||qrNorm.includes(n))&&n.length>6)continue;
    if(/^[A-Z0-9()_.\-\/]+$/.test(l)&&l.length>10&&!/\s/.test(l))continue;
    if(/[a-zA-Z]{3,}/.test(l))d.push(l);}
  return d.join(' ').replace(/\s+/g,' ').replace(/[=_\[\]|]+/g,'').trim();}

// ---------- QR ----------
async function detectQR(src){
  // 1) BarcodeDetector (manh nhat, co tren Chrome/Android)
  if('BarcodeDetector' in window){
    try{ const det=new BarcodeDetector({formats:['qr_code']}); const codes=await det.detect(src);
      if(codes.length) return {value:codes[0].rawValue,corners:codes[0].cornerPoints.map(p=>({x:p.x,y:p.y}))}; }catch(e){}
  }
  // 2) ZXing (mạnh, chịu lóa/nghiêng) — chạy tốt cả trên iPhone
  try{ const zx=zxingDecode(src); if(zx) return zx; }catch(e){}
  if(typeof jsQR==='undefined') return null;
  // 2) jsQR nhieu buoc: nhieu ti le + nhi phan thich nghi (chong loa / anh sang khong deu)
  const maxSide=Math.max(src.width,src.height);
  let scales=[ maxSide>1500?1500/maxSide:1, 1100/maxSide, 800/maxSide ].filter(s=>s>0&&s<=1);
  scales=[...new Set(scales.map(s=>Math.round(s*1000)/1000))];
  for(const s of scales){
    const cv = s>=0.999? src : scaleCanvas(src,s);
    let r=runJsQR(cv); if(r) return rescaleCorners(r,s);        // anh xam goc
    r=runJsQR(adaptiveCanvas(cv)); if(r) return rescaleCorners(r,s); // nhi phan thich nghi
  }
  return null;
}
function zxingDecode(src){
  if(typeof ZXing==='undefined') return null;
  const maxSide=Math.max(src.width,src.height);
  let scales=[ maxSide>1600?1600/maxSide:1, 1000/maxSide ].filter(s=>s>0&&s<=1);
  scales=[...new Set(scales.map(s=>Math.round(s*1000)/1000))];
  for(let i=0;i<scales.length;i++){
    const s=scales[i]; const cv=s>=0.999?src:scaleCanvas(src,s);
    const r=zxDecodeCanvas(cv, i===scales.length-1);   // TRY_HARDER o lan cuoi
    if(r){
      let pts=r.points, corners;
      if(pts.length>=3) corners=[pts[1],pts[2],pts[0]].concat(pts[3]?[pts[3]]:[]); // topLeft,topRight,bottomLeft(,align)
      else corners=pts;
      corners=corners.map(p=>({x:p.x/s,y:p.y/s}));
      return {value:r.value, corners};
    }
  }
  return null;
}
function zxDecodeCanvas(cv,hard){
  try{
    const w=cv.width,h=cv.height,rgba=cv.getContext('2d').getImageData(0,0,w,h).data;
    const lum=new Uint8ClampedArray(w*h);
    for(let i=0,j=0;i<rgba.length;i+=4,j++) lum[j]=(rgba[i]*77+rgba[i+1]*150+rgba[i+2]*29)>>8;
    const src=new ZXing.RGBLuminanceSource(lum,w,h);
    const bmp=new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(src));
    const reader=new ZXing.MultiFormatReader();
    const hints=new Map(); hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[ZXing.BarcodeFormat.QR_CODE]);
    if(hard) hints.set(ZXing.DecodeHintType.TRY_HARDER,true);
    reader.setHints(hints);
    const res=reader.decode(bmp,hints);
    return {value:res.getText(), points:(res.getResultPoints()||[]).map(p=>({x:p.getX(),y:p.getY()}))};
  }catch(e){ return null; }
}
function runJsQR(cv){
  try{ const d=cv.getContext('2d').getImageData(0,0,cv.width,cv.height);
    const r=jsQR(d.data,cv.width,cv.height,{inversionAttempts:'attemptBoth'});
    if(r){const L=r.location; return {value:r.data,corners:[L.topLeftCorner,L.topRightCorner,L.bottomRightCorner,L.bottomLeftCorner]};}
  }catch(e){} return null;
}
function rescaleCorners(r,s){ if(s&&Math.abs(s-1)>0.001) r.corners=r.corners.map(p=>({x:p.x/s,y:p.y/s})); return r; }
function scaleCanvas(src,s){ const c=document.createElement('canvas'); c.width=Math.max(1,src.width*s|0); c.height=Math.max(1,src.height*s|0);
  const x=c.getContext('2d'); x.imageSmoothingQuality='high'; x.drawImage(src,0,0,c.width,c.height); return c; }
// Nhi phan thich nghi (adaptive mean bang anh tich phan) -> chong loa tem QR
function adaptiveCanvas(src){
  const w=src.width,h=src.height,ctx=src.getContext('2d'),img=ctx.getImageData(0,0,w,h),p=img.data;
  const g=new Float64Array(w*h);
  for(let i=0,j=0;i<p.length;i+=4,j++) g[j]=0.299*p[i]+0.587*p[i+1]+0.114*p[i+2];
  const S=new Float64Array((w+1)*(h+1));
  for(let y=1;y<=h;y++){ let rs=0; for(let x=1;x<=w;x++){ rs+=g[(y-1)*w+(x-1)]; S[y*(w+1)+x]=S[(y-1)*(w+1)+x]+rs; } }
  const rad=Math.max(8,Math.floor(Math.min(w,h)/16)), T=0.85;
  const out=ctx.createImageData(w,h),q=out.data;
  for(let y=0;y<h;y++){ const y1=Math.max(0,y-rad),y2=Math.min(h-1,y+rad);
    for(let x=0;x<w;x++){ const x1=Math.max(0,x-rad),x2=Math.min(w-1,x+rad),cnt=(x2-x1+1)*(y2-y1+1);
      const sum=S[(y2+1)*(w+1)+(x2+1)]-S[y1*(w+1)+(x2+1)]-S[(y2+1)*(w+1)+x1]+S[y1*(w+1)+x1];
      const j=y*w+x,k=j*4,v=g[j]*cnt<=sum*T?0:255; q[k]=q[k+1]=q[k+2]=v; q[k+3]=255; } }
  const c=document.createElement('canvas'); c.width=w;c.height=h; c.getContext('2d').putImageData(out,0,0); return c;
}
function cropSticker(cv,corners){
  const xs=corners.map(p=>p.x),ys=corners.map(p=>p.y); const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
  const x0=Math.max(0,x-0.3*w),y0=Math.max(0,y-0.3*h),x1=Math.min(cv.width,x+4.5*w),y1=Math.min(cv.height,y+2.2*h);
  const cw=(x1-x0)|0,ch=(y1-y0)|0; if(cw<10||ch<10)return null;
  const c=document.createElement('canvas'); c.width=cw;c.height=ch; c.getContext('2d').drawImage(cv,x0,y0,cw,ch,0,0,cw,ch); return c;
}

// ---------- tien ich anh ----------
function fileToCanvas(file,max){return new Promise(res=>{const img=new Image();img.onload=()=>{
  const s=Math.min(1,max/Math.max(img.width,img.height));const c=document.createElement('canvas');
  c.width=img.width*s|0;c.height=img.height*s|0;c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c);};img.src=URL.createObjectURL(file);});}
function rotate90(src,k){k=((k%4)+4)%4;let c=src;for(let i=0;i<k;i++){const n=document.createElement('canvas');
  n.width=c.height;n.height=c.width;const x=n.getContext('2d');x.translate(0,n.height);x.rotate(-Math.PI/2);x.drawImage(c,0,0);c=n;}return c;}
function prep(src,deg,scale,thr){const r=((deg%360)+360)%360,sw=src.width,sh=src.height;
  const c=document.createElement('canvas');if(r===90||r===270){c.width=sh;c.height=sw;}else{c.width=sw;c.height=sh;}
  const ctx=c.getContext('2d');ctx.translate(c.width/2,c.height/2);ctx.rotate(r*Math.PI/180);ctx.drawImage(src,-sw/2,-sh/2);
  let s=scale||1;const cap=2400;s=Math.min(s,cap/Math.max(c.width,c.height));let out=c;
  if(Math.abs(s-1)>0.01){const c2=document.createElement('canvas');c2.width=c.width*s|0;c2.height=c.height*s|0;
    const x=c2.getContext('2d');x.imageSmoothingQuality='high';x.drawImage(c,0,0,c2.width,c2.height);out=c2;}
  if(thr){const x=out.getContext('2d');const d=x.getImageData(0,0,out.width,out.height);const p=d.data;
    for(let i=0;i<p.length;i+=4){const g=0.299*p[i]+0.587*p[i+1]+0.114*p[i+2];const v=g>thr?255:0;p[i]=p[i+1]=p[i+2]=v;}x.putImageData(d,0,0);}
  return out;}
